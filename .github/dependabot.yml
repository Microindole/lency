version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 2
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "npm"
    directory: "/editors/vscode"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    cooldown:
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 1
    commit-message:
      prefix: "build"
      prefix-development: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
