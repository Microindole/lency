name: Lints & Docs

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'editors/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'editors/**'
      - 'docs/**'
      - '**.md'

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608
  LLVM_SYS_150_PREFIX: /usr/lib/llvm-15

concurrency:
  group: lints-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Scope
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tests/integration/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/lints.yml'
      - name: Scope Summary
        run: |
          {
            echo "### CI Scope"
            echo "- workflow: lints.yml"
            echo "- rust: ${{ steps.filter.outputs.rust }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # 1. Linux Static Checks & Lints
  static-checks:
    name: Static Checks & Quality
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format Check
        run: cargo fmt --all -- --check
      - name: Clippy Check
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: File Size & TODOs & Banned Patterns
        run: |
           python3 scripts/check_file_size.py --scope rust
           python3 scripts/check_todos.py --scope rust
           python3 scripts/check_banned_patterns.py --scope rust

  # 2. Documentation Check
  doc-check:
    name: Documentation
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check Docs
        run: cargo doc --no-deps --document-private-items
