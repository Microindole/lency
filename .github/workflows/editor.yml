name: Editor extension

on:
  push:
    branches: [ "main" ]
    paths:
      - 'editors/**'
      - '.github/workflows/editor.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'editors/**'
      - '.github/workflows/editor.yml'
  workflow_dispatch:

jobs:
  check-extension:
    name: Editor Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: editors/vscode/package-lock.json

    - name: Use Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run editor all checks
      working-directory: editors/vscode
      run: npm run check:all:ci

    - name: Scope Summary
      run: |
        {
          echo "### CI Scope"
          echo "- workflow: editor.yml"
          echo "- scope: editors"
          echo "- os: ${{ matrix.os }}"
          echo "- command: \`npm run check:all:ci\`"
        } >> "$GITHUB_STEP_SUMMARY"
