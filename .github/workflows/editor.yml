name: Editor extension

on:
  push:
    branches: [ "main" ]
    paths:
      - 'editors/**'
      - '.github/workflows/editor.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'editors/**'
      - '.github/workflows/editor.yml'
  workflow_dispatch:
    inputs:
      run_windows:
        description: "Also run Windows editor checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: editor-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-extension-linux:
    name: Editor Checks (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: editors/vscode/package-lock.json

    - name: Use Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run editor all checks
      working-directory: editors/vscode
      run: npm run check:all:ci

    - name: Scope Summary
      shell: pwsh
      run: |
        @'
        ### CI Scope
        - workflow: editor.yml
        - scope: editors
        - os: ubuntu-latest
        - trigger: default
        - command: `npm run check:all:ci`
        '@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  check-extension-windows:
    name: Editor Checks (Windows)
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.run_windows == 'true')
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: editors/vscode/package-lock.json

    - name: Use Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run editor all checks
      working-directory: editors/vscode
      run: npm run check:all:ci

    - name: Scope Summary
      shell: pwsh
      run: |
        @'
        ### CI Scope
        - workflow: editor.yml
        - scope: editors
        - os: windows-latest
        - trigger: main or workflow_dispatch(run_windows=true)
        - command: `npm run check:all:ci`
        '@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
