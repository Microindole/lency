name: Editor Release

on:
  push:
    tags:
      - "ev*"
  workflow_dispatch:
    inputs:
      version:
        description: "VSCode extension version tag (例如 ev0.7.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#ev}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${TAG}" ]; then
            echo "invalid vscode tag: ${TAG}" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Sync extension version from tag
        working-directory: editors/vscode
        run: npm version ${{ steps.resolve.outputs.version }} --no-git-tag-version

      - name: Run editor checks
        working-directory: editors/vscode
        run: npm run check:all:ci

      - name: Package VSIX
        working-directory: editors/vscode
        run: npx @vscode/vsce package --out "dist/lency-lang-${{ steps.resolve.outputs.version }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: lency-lang-vsix
          path: editors/vscode/dist/lency-lang-${{ steps.resolve.outputs.version }}.vsix

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          generate_release_notes: true
          files: editors/vscode/dist/lency-lang-${{ steps.resolve.outputs.version }}.vsix
