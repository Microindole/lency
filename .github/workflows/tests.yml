name: Tests

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  changes:
    name: Detect Changed Scope
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      lency: ${{ steps.filter.outputs.lency }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'lib/**'
              - 'tests/integration/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/run_checks.sh'
              - 'scripts/check_*.py'
              - '.github/workflows/tests.yml'
            lency:
              - 'lencyc/**'
              - 'lib/**'
              - 'tests/example/**'
              - 'scripts/run_lency_checks.sh'
              - 'scripts/check_*.py'
              - '.github/workflows/tests.yml'

  rust-checks:
    name: Rust Checks (Linux)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust Workflow
        run: ./scripts/run_checks.sh

  lency-checks:
    name: Lency Checks (Linux)
    needs: changes
    if: needs.changes.outputs.lency == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Lency Workflow
        run: ./scripts/run_lency_checks.sh

  # 3. Release Build
  build-release:
    name: Build Release
    needs: changes
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    if: (github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Release
        run: cargo build --release --verbose

  # 4. MacOS Check
  macos-check:
    name: MacOS Test
    needs: changes
    runs-on: macos-latest
    if: (github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true') || github.event_name == 'workflow_dispatch'
    env:
      LLVM_SYS_150_PREFIX: /opt/homebrew/opt/llvm@15
      # Use Rust v0 symbol mangling to avoid macOS ld64 symbol name length bug
      RUSTFLAGS: "-C symbol-mangling-version=v0"
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: brew install llvm@15
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & Test
        run: cargo test --verbose

  # 5. Windows Check (暂时禁用 - llvm-sys 在 Windows 上配置复杂)
