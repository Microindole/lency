name: Tests

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - 'editors/**'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - 'editors/**'
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      run_full_matrix:
        description: "Run heavy jobs (release + macOS + Windows)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Scope
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      lency: ${{ steps.filter.outputs.lency }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'tests/integration/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/linux/run_checks.sh'
              - 'scripts/win/run_checks.ps1'
              - 'scripts/linux/run_lcy_tests.sh'
              - 'scripts/win/run_lcy_tests.ps1'
              - '.github/workflows/tests.yml'
            lency:
              - 'lencyc/**'
              - 'lib/**'
              - 'tests/example/**'
              - 'xtask/**'
              - 'scripts/linux/run_lency_checks.sh'
              - 'scripts/linux/lency_selfhost_*.sh'
              - 'scripts/check_*.py'
              - '.github/workflows/tests.yml'
      - name: Scope Summary
        run: |
          {
            echo "### CI Scope"
            echo "- workflow: tests.yml"
            echo "- rust: ${{ steps.filter.outputs.rust }}"
            echo "- lency: ${{ steps.filter.outputs.lency }}"
          } >> "$GITHUB_STEP_SUMMARY"

  rust-checks:
    name: Rust Checks (Linux)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust Workflow
        run: bash scripts/linux/run_checks.sh

  lency-checks:
    name: Lency Checks (Linux)
    needs: changes
    if: needs.changes.outputs.lency == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Lency Workflow
        run: bash scripts/linux/run_lency_checks.sh

  # 3. Release Build
  build-release:
    name: Build Release
    needs: changes
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    if: (github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_full_matrix == 'true')
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libpolly-15-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Release
        run: cargo build --release --verbose

  # 4. MacOS Check
  macos-check:
    name: MacOS Test
    needs: changes
    runs-on: macos-latest
    if: (github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_full_matrix == 'true')
    env:
      LLVM_SYS_150_PREFIX: /opt/homebrew/opt/llvm@15
      # Use Rust v0 symbol mangling to avoid macOS ld64 symbol name length bug
      RUSTFLAGS: "-C symbol-mangling-version=v0"
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM
        run: brew install llvm@15
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & Test
        run: cargo test --verbose

  # 5. Windows Check
  windows-check:
    name: Windows Test
    needs: changes
    runs-on: windows-latest
    if: (github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_full_matrix == 'true')
    env:
      LLVM15_WINDOWS_URL: https://github.com/Microindole/lency/releases/download/llvm-15.0.7-custom-v1/llvm-15.0.7-custom-windows-x86_64-msvc-x86only.zip
    steps:
      - uses: actions/checkout@v6
      - name: Validate LLVM release URL
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LLVM15_WINDOWS_URL)) {
            throw "LLVM15_WINDOWS_URL is empty."
          }
      - name: Download LLVM 15 (custom release)
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "llvm15-win.zip"
          Invoke-WebRequest -Uri $env:LLVM15_WINDOWS_URL -OutFile $archive
          $extractDir = Join-Path $env:RUNNER_TEMP "llvm15"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
      - name: Debug LLVM archive layout
        shell: pwsh
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "llvm15"
          Write-Host "LLVM extract root: $extractDir"
          if (-not (Test-Path $extractDir)) {
            throw "LLVM extract directory not found: $extractDir"
          }
          Write-Host "Top-level entries:"
          Get-ChildItem -Path $extractDir -Force | ForEach-Object {
            Write-Host ("  {0}" -f $_.FullName)
          }
          Write-Host "Directories up to depth 3:"
          Get-ChildItem -Path $extractDir -Directory -Recurse -Depth 3 -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host ("  {0}" -f $_.FullName)
          }
          Write-Host "llvm-config candidates:"
          Get-ChildItem -Path $extractDir -Filter "llvm-config*.exe" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host ("  {0}" -f $_.FullName)
          }
      - name: Resolve LLVM prefix
        shell: pwsh
        run: |
          .\scripts\win\setup-dev.ps1 -SearchRoots (Join-Path $env:RUNNER_TEMP "llvm15")
          if ([string]::IsNullOrWhiteSpace($env:LLVM_SYS_150_PREFIX)) {
            throw "Failed to resolve LLVM_SYS_150_PREFIX from downloaded archive."
          }
          "LLVM_SYS_150_PREFIX=$env:LLVM_SYS_150_PREFIX" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$env:LLVM_SYS_150_PREFIX\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & Test
        shell: pwsh
        run: cargo test --verbose
